version: "3.91"
services:
  app:
    build:
      context: ${REPO_DIR}
      dockerfile: ${REPO_DIR}/docker/forte-pacs/Dockerfile
    image: forte/forte-pacs-release:1.0
    stop_signal: SIGINT
    environment:
      - TZ=${TIMEZONE}
      - redis_url=${REDIS_URL}
      - REDIS_URL=${REDIS_URL}
      - UVICORN_TIMEOUT=${UVICORN_TIMEOUT}
      - LOGS_DIR=/logs/web_app
    volumes:

      - logsDirRelease:/logs/web_app
      - configDirRelease:/code/config
      - uploadDirRelease:/upload

    depends_on:
      postgres:
          condition: service_healthy
      redis:
          condition: service_started
    ports:
      - "${APP_PORTS}"

  worker:
    build:
      context: ${REPO_DIR}
      dockerfile: ${REPO_DIR}/docker/rq-worker/Dockerfile
    image: forte/rq-worker-pacs-release:1.0
    environment:
      - redis_url=${REDIS_URL}
      - TZ=${TIMEZONE}
      - qido_queue_name=${QIDO_QUEUE_NAME}

    depends_on:
      redis:
          condition: service_started
      app:
          condition: service_started
    volumes:
    
      - configDirRelease:/code/config


  redis:
    hostname: redis
    image: redis:7.0.8-bullseye
    ports:
      - ${REDIS_PORT}

  postgres:
    hostname: postgres
    image: postgres:17.0-bullseye
    ports:
      - 5432:5432
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s
    volumes:

      - type: bind
        source: ${DB_DIR_LOCAL}
        target: /var/lib/postgresql/data

    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_DB=${POSTGRES_DB}
      - TZ=${TIMEZONE}

volumes:
  uploadDirRelease:
    driver: local
    driver_opts:
      type: none
      device: ${UPLOAD_DIR_LOCAL}
      o: bind

  configDirRelease:
    driver: local
    driver_opts:
      type: none
      device: ${CONFIG_DIR_LOCAL}
      o: bind

  logsDirRelease:
    driver: local
    driver_opts:
      type: none
      device: ${LOGS_DIR_LOCAL}
      o: bind
